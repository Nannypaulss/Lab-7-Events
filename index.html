<!DOCTYPE html>
<html lang="en">
    <head>
<meta charset="UTF-8">
<title> Lab 7 - JavaScript Events</title>
<link rel="stylesheet" href="style.css">
</head>

<body> 
<h1> JavaScript Events</h1>
<section> 
    <h2> Mouse Events  </h2>
    <button id="mouseBtn">Hover over me!</button>
    <p id="mouseMsg"> Hover over me again to see a full message!</p>

</section>

<section> 
    <h2> Keyboard Events</h2>
    <input type="text" id="keyInput" placeholder="Type something...">
    <p id="keyMsg"> Last key pressed: </p> 
</section>

<section> 
    <h2> Form Events </h2>
    <form id="myform">
        <input type="text" id="name" placeholder="Enter your name">
        <button type="submit">Submit</button>
    </form>
    <p id="formMsg"> Please fill out the form and submit! </p>
</section>

<section>
    <h2> Focus and Blur events</h2>
    <input type="text" id="focusinput" placeholder="Click here to focus">
    <p id="focusMsg"> Input not focused yet.</p>
</section>

<section>
    <h2> Event Delegation</h2>
    <div id="btnContainer">
        <button type="button">Button 1</button>
        <button type="button">Button 2</button>
        <button type="button">Button 3</button>
    </div>
    <p id="delegationMsg"> Click any button to see which one was clicked! </p>
</section>
<script src="script.js"></script>
</body>
</html>
